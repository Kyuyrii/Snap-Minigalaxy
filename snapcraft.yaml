name: minigalaxy
base: core24
version: 1.4.1
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
summary: A simple GOG client for Linux
description: |
 Minigalaxy lets you download, install and play your GOG Linux games without getting in your way. 
grade: stable
confinement: strict
compression: lzo
icon: minigalaxy.png

apps:
  minigalaxy:
    command-chain:
      - snap/command-chain/gpu-2404-wrapper
      - snap/command-chain/desktop-launch
    command: snap/command-chain/request-joystick-plug
    desktop: usr/share/applications/io.github.sharkwouter.Minigalaxy.desktop
    common-id: io.github.sharkwouter.Minigalaxy
    environment:
      HOME: $SNAP_USER_COMMON
      PYTHONPATH: $SNAP/usr/lib/python3/dist-packages:$PYTHONPATH
      PATH: $SNAP/usr/games:$PATH
    plugs:
      - desktop
      - desktop-legacy
      - gsettings
      - opengl
      - wayland
      - x11
      - audio-playback
      - network
      - network-bind
      - network-status
      - screen-inhibit-control
      - home
      - removable-media
      - mount-observe
      - system-observe
      - hardware-observe
      - joystick
      - bluez

environment:
  SNAP_DESKTOP_RUNTIME: $SNAP/gnome-platform
  GTK_USE_PORTAL: '1'

plugs:
  shared-memory:
    private: true
  desktop:
    mount-host-font-cache: false
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes
  gnome-46-2404:
    interface: content
    target: $SNAP/gnome-platform
    default-provider: gnome-46-2404
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.0:
    symlink: $SNAP/gnome-platform/usr/lib/x86_64-linux-gnu/webkit2gtk-4.0
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    symlink: $SNAP/gnome-platform/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1
  /usr/share/xml/iso-codes:
    bind: $SNAP/gnome-platform/usr/share/xml/iso-codes
  /usr/share/libdrm:
    bind: $SNAP/gpu-2404/libdrm
  /usr/share/drirc.d:
    symlink: $SNAP/gpu-2404/drirc.d
  /usr/share/X11/XErrorDB:
    symlink: $SNAP/gpu-2404/X11/XErrorDB
  /usr/lib/mangohud:
    symlink: $SNAP/usr/lib/mangohud

lint:
  ignore:
    - library:
        - usr/lib/mangohud/lib32/**

hooks:
  configure:
    command-chain:
      - snap/command-chain/hooks-configure-fonts

#package-repositories:
#  - type: apt
#    url: https://dl.winehq.org/wine-builds/ubuntu
#    suites: [resolute]
#    components: [main]
#    architectures: [amd64]
#    key-id: D43F640145369C51D786DDEA76F1A20FF987672F

parts:
  minigalaxy-app:
    plugin: dump
    source: https://github.com/sharkwouter/minigalaxy/releases/download/$SNAPCRAFT_PROJECT_VERSION/minigalaxy_$SNAPCRAFT_PROJECT_VERSION_all.deb
    override-build: |
      craftctl default
      sed -i 's|Name=Minigalaxy|Name=Minigalaxy [Kyu]|' $CRAFT_PART_INSTALL/usr/share/applications/io.github.sharkwouter.Minigalaxy.desktop

  base-dependencies:
    after: [minigalaxy-app]
    plugin: nil
    stage-packages: [python3-requests, unzip, unrar-free, wget]

  gamemode:
    plugin: nil
    stage-packages: [gamemode, gamemode-daemon, libgamemode0, libgamemodeauto0]

  mangohud:
    plugin: dump
    source: https://github.com/flightlessmango/MangoHud/releases/download/v0.8.2/MangoHud-0.8.2.r0.ga37b007.tar.gz
    override-build: |
      craftctl default
      tar -xvf MangoHud-package.tar -C $CRAFT_PART_INSTALL
    prime: [usr]

  sdl2:
    plugin: nil
    stage-packages: [libsdl2-2.0-0, libdecor-0-0, libsamplerate0]

  zenity:
    plugin: nil
    stage-packages: [zenity]
    prime: [usr/bin/zenity]

#  wine:
#    plugin: nil
#    stage-packages: [winehq-stable]

  cleanup:
    after: [minigalaxy-app, base-dependencies, gamemode, mangohud, zenity] #, wine]
    plugin: nil
    build-snaps:
      - mesa-2404
      - gnome-46-2404
    override-prime: |
      set -eux
      cd /snap/mesa-2404/current/usr/lib
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/lib/{} \;
      cd /snap/mesa-2404/current/usr/share
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;

      cd /snap/gnome-46-2404/current/usr/lib
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/lib/{} \;
      cd /snap/gnome-46-2404/current/usr/share
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;

  command-chain:
    after: [cleanup]
    plugin: dump
    source: ./other-files

  wine-kron4ek:
    after: [command-chain]
    plugin: dump
    source: https://github.com/Kron4ek/Wine-Builds/releases/download/11.5/wine-11.5-amd64-wow64.tar.xz
    organize:
      bin: usr/bin
      include: usr/include
      lib: usr/lib
      share: usr/share

  winetricks:
    after: [wine-kron4ek]
    plugin: make
    source: https://github.com/Winetricks/winetricks.git
    source-tag: 20260125
    make-parameters:
      - PREFIX=/usr
